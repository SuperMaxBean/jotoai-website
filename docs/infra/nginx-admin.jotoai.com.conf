server {
    server_name admin.jotoai.com;

    location /admin/ {
        proxy_pass http://localhost:3004/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_pass http://localhost:3004/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /images/ {
        proxy_pass http://localhost:3004/images/;
        proxy_set_header Host $host;
    }

    location /brand/ {
        proxy_pass http://localhost:3004/brand/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location / {
        return 301 /admin/dashboard.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/admin.jotoai.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/admin.jotoai.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = admin.jotoai.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name admin.jotoai.com;
    return 404; # managed by Certbot


}
